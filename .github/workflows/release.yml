name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build luz.exe
        run: pyinstaller --onefile --name luz main.py

      - name: Build ray.exe
        run: pyinstaller --onefile --name ray ray.py

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Compile installer
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$version `
            installer\luz_installer.iss

      - name: Rename installer
        run: |
          $version = "${{ github.ref_name }}"
          Rename-Item installer_output\luz-setup.exe "luz-$version-setup.exe"

      - name: Create GitHub Release and upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          name: "Luz ${{ github.ref_name }}"
          files: installer_output/luz-${{ github.ref_name }}-setup.exe
          generate_release_notes: true

  build-linux:
    # Build inside a Debian 11 (bullseye) container for glibc 2.31 compatibility
    runs-on: ubuntu-22.04
    container: python:3.11-slim-bullseye

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y binutils

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build luz
        run: pyinstaller --onefile --clean --strip --name luz main.py

      - name: Build ray
        run: pyinstaller --onefile --clean --strip --name ray ray.py

      - name: Package binaries
        run: |
          mkdir -p luz-linux/lib
          cp dist/luz dist/ray luz-linux/
          cp -r libs/luz-math luz-linux/lib/
          cp -r libs/luz-random luz-linux/lib/
          cp -r libs/luz-system luz-linux/lib/
          cp -r libs/luz-io luz-linux/lib/
          tar -czf "luz-linux-${GITHUB_REF_NAME}.tar.gz" -C luz-linux .

      - name: Upload Linux binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: luz-linux-${{ github.ref_name }}.tar.gz
