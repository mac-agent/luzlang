site_name: Luz Language
site_description: A lightweight, interpreted programming language written in Python
site_url: https://elabsurdo984.github.io/luz-lang/
repo_url: https://github.com/Elabsurdo984/luz-lang
repo_name: Elabsurdo984/luz-lang

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  logo: img/icon.png
  favicon: img/icon.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page

nav:
  - Home: index.md
  - Download: download.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Usage: getting-started/usage.md
  - Language Reference:
      - Types: language/types.md
      - Variables: language/variables.md
      - Operators: language/operators.md
      - Control Flow: language/control-flow.md
      - Format Strings: language/format-strings.md
      - Functions: language/functions.md
      - Lambdas: language/lambdas.md
      - Collections: language/collections.md
      - Object-Oriented Programming: language/oop.md
      - Error Handling: language/error-handling.md
      - Modules: language/modules.md
  - Built-in Functions: builtins.md
  - Standard Library:
      - luz-math: stdlib/math.md
      - luz-random: stdlib/random.md
      - luz-io: stdlib/io.md
      - luz-system: stdlib/system.md
      - luz-clock: stdlib/clock.md
  - Ray Package Manager: ray.md
  - Architecture: architecture.md
